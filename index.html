        // --- View Component: Calculators ---
        function AnalyticsView() {
            const { state } = useContext(ExpenseContext);
            const [ciPrincipal, setCiPrincipal] = useState('10000');
            const [ciRate, setCiRate] = useState('8');
            const [ciYears, setCiYears] = useState('10');
            const [ciMonthly, setCiMonthly] = useState('500');
            const [ciResult, setCiResult] = useState(null);

            const calculateCompoundInterest = (e) => {
                e.preventDefault();
                const P = parseFloat(ciPrincipal);
                const r = parseFloat(ciRate) / 100 / 12;
                const t = parseFloat(ciYears) * 12;
                const PMT = parseFloat(ciMonthly);

                const fvPrincipal = P * Math.pow(1 + r, t);
                const fvContributions = PMT * ((Math.pow(1 + r, t) - 1) / r);
                const totalWealth = fvPrincipal + fvContributions;
                const totalContributions = P + (PMT * t);
                const totalInterest = totalWealth - totalContributions;

                setCiResult({
                    totalWealth: Math.round(totalWealth),
                    contributions: Math.round(totalContributions),
                    interest: Math.round(totalInterest)
                });
            };

            return (
                <div>
                    <div className="header">
                        <div className="header-title">
                            <h1>Financial Engineering Calculators</h1>
                            <p>Simulate compounding assets, investment targets, and debt amortization tracks</p>
                        </div>
                    </div>

                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '24px' }}>
                        <div className="glass-card">
                            <div className="card-title-bar">
                                <h3><i className="fa-solid fa-chart-line"></i> Compound Wealth Simulator</h3>
                            </div>
                            <form onSubmit={calculateCompoundInterest}>
                                <div className="form-row">
                                    <div className="form-group">
                                        <label className="form-label">Principal Seed ({state.currency})</label>
                                        <input type="number" className="form-control" value={ciPrincipal} onChange={e => setCiPrincipal(e.target.value)} />
                                    </div>
                                    <div className="form-group">
                                        <label className="form-label">Monthly Additions ({state.currency})</label>
                                        <input type="number" className="form-control" value={ciMonthly} onChange={e => setCiMonthly(e.target.value)} />
                                    </div>
                                </div>
                                <div className="form-row">
                                    <div className="form-group">
                                        <label className="form-label">Expected Growth APR (%)</label>
                                        <input type="number" step="0.1" className="form-control" value={ciRate} onChange={e => setCiRate(e.target.value)} />
                                    </div>
                                    <div className="form-group">
                                        <label className="form-label">Timeline Horizon (Years)</label>
                                        <input type="number" className="form-control" value={ciYears} onChange={e => setCiYears(e.target.value)} />
                                    </div>
                                </div>
                                <button type="submit" className="btn btn-primary" style={{ width: '100%' }}>Compute Compounding Projection</button>
                            </form>

                            {ciResult && (
                                <div style={{ marginTop: '24px', paddingTop: '24px', borderTop: '1px solid var(--border-color)' }}>
                                    <h4 style={{ marginBottom: '12px' }}>Compound Forecast:</h4>
                                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '12px', textAlign: 'center' }}>
                                        <div style={{ background: 'var(--border-color)', padding: '12px', borderRadius: '8px' }}>
                                            <div style={{ fontSize: '10px', color: 'var(--text-muted)' }}>TOTAL VALUE</div>
                                            <strong style={{ fontSize: '16px', color: 'var(--success)' }}>{state.currency}{ciResult.totalWealth.toLocaleString()}</strong>
                                        </div>
                                        <div style={{ background: 'var(--border-color)', padding: '12px', borderRadius: '8px' }}>
                                            <div style={{ fontSize: '10px', color: 'var(--text-muted)' }}>CONTRIBUTED</div>
                                            <strong style={{ fontSize: '16px' }}>{state.currency}{ciResult.contributions.toLocaleString()}</strong>
                                        </div>
                                        <div style={{ background: 'var(--border-color)', padding: '12px', borderRadius: '8px' }}>
                                            <div style={{ fontSize: '10px', color: 'var(--text-muted)' }}>INTEREST EARNED</div>
                                            <strong style={{ fontSize: '16px', color: 'var(--accent-secondary)' }}>{state.currency}{ciResult.interest.toLocaleString()}</strong>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>

                        <div className="glass-card">
                            <div className="card-title-bar">
                                <h3><i className="fa-solid fa-graduation-cap"></i> Financial Independence (F.I.R.E) Rule</h3>
                            </div>
                            <p style={{ fontSize: '14px', color: 'var(--text-secondary)', lineHeight: '1.6' }}>
                                The 4% Rule dictates that if you can withdraw 4% of your retirement nest egg annually without running out of money, you are Financially Independent.
                            </p>
                            <div style={{ background: 'linear-gradient(135deg, rgba(6,182,212,0.1), rgba(99,102,241,0.05))', padding: '16px', borderRadius: '12px', marginTop: '16px', border: '1px solid rgba(6,182,212,0.15)' }}>
                                <strong style={{ fontSize: '14px', display: 'block', color: 'var(--accent-secondary)' }}>F.I.R.E Target Formula:</strong>
                                <span style={{ fontSize: '18px', fontWeight: 700, display: 'block', marginTop: '6px', fontFamily: 'Outfit' }}>
                                    Annual Expense Allocation × 25
                                </span>
                                <span style={{ fontSize: '12px', color: 'var(--text-secondary)', display: 'block', marginTop: '6px' }}>
                                    If your annual expenses are {state.currency}45,000, your target nest egg is <strong>{state.currency}1,125,000</strong>.
                                </span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- View Component: Settings ---
        function SettingsView() {
            const { state, dispatch, apiRequest } = useContext(ExpenseContext);
            const [apiUrlInput, setApiUrlInput] = useState(state.apiUrl || '');

            const handleReset = () => {
                if (confirm('Reset ExpenseOS state to initial sandbox ledger? All custom entries will be lost.')) {
                    dispatch({ type: 'RESET_DATA' });
                }
            };

            const handleSaveSettings = async (e) => {
                e.preventDefault();
                dispatch({ type: 'SET_API_URL', payload: apiUrlInput.trim() });
                alert('Backend API settings updated. The application will connect to the new endpoint.');
            };

            const handleCurrencyChange = async (e) => {
                const newCurrency = e.target.value;
                try {
                    if (state.apiUrl && state.token) {
                        await apiRequest('/api/auth/currency', {
                            method: 'PUT',
                            body: JSON.stringify({ currency: newCurrency })
                        });
                    }
                    dispatch({ type: 'SET_CURRENCY', payload: newCurrency });
                } catch (err) {
                    alert(err.message);
                }
            };

            const handleBackup = () => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state));
                const dlAnchorElem = document.createElement('a');
                dlAnchorElem.setAttribute("href", dataStr);
                dlAnchorElem.setAttribute("download", `ExpenseOS_Backup_${new Date().toISOString().split('T')[0]}.json`);
                dlAnchorElem.click();
            };

            const handleRestore = async (e) => {
                const fileReader = new FileReader();
                fileReader.onload = async event => {
                    try {
                        const parsed = JSON.parse(event.target.result);
                        if (parsed.transactions && parsed.budgets) {
                            if (state.apiUrl && state.token) {
                                await apiRequest('/api/system/sync', {
                                    method: 'POST',
                                    body: JSON.stringify(parsed)
                                });
                            }
                            dispatch({ type: 'SYNC_ALL_DATA', payload: parsed });
                            alert('ExpenseOS system database restored successfully.');
                        } else {
                            alert('Invalid file format. State backup does not contain transactional fields.');
                        }
                    } catch (err) {
                        alert('Error parsing uploaded backup file.');
                    }
                };
                fileReader.readAsText(e.target.files[0]);
            };

            return (
                <div>
                    <div className="header">
                        <div className="header-title">
                            <h1>System Configuration</h1>
                            <p>Control system integrity, database synchronization, and currency preferences</p>
                        </div>
                    </div>

                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(320px, 1fr))', gap: '24px' }}>
                        {/* API Config Card */}
                        <div className="glass-card">
                            <h3 style={{ fontSize: '16px', marginBottom: '12px' }}><i className="fa-solid fa-cloud-arrow-up"></i> Backend API Synchronizer</h3>
                            <p style={{ fontSize: '13px', color: 'var(--text-secondary)', marginBottom: '16px', lineHeight: '1.4' }}>
                                Connect your Render backend and MongoDB Atlas. When empty, ExpenseOS executes inside the offline local browser sandbox.
                            </p>
                            <form onSubmit={handleSaveSettings}>
                                <div className="form-group">
                                    <label className="form-label">Backend API URL</label>
                                    <input
                                        type="url"
                                        className="form-control"
                                        placeholder="e.g. https://expense-os-api.onrender.com"
                                        value={apiUrlInput}
                                        onChange={e => setApiUrlInput(e.target.value)}
                                    />
                                </div>
                                <button type="submit" className="btn btn-primary" style={{ width: '100%' }}>Connect & Save Endpoint</button>
                            </form>
                        </div>

                        {/* Currency Preference Card */}
                        <div className="glass-card">
                            <h3 style={{ fontSize: '16px', marginBottom: '12px' }}><i className="fa-solid fa-coins"></i> Currency Settings</h3>
                            <p style={{ fontSize: '13px', color: 'var(--text-secondary)', marginBottom: '16px', lineHeight: '1.4' }}>
                                Modify your regional currency formatting. Changes apply dynamically across all ledgers, budgets, and Splitwise shared structures.
                            </p>
                            <div className="form-group">
                                <label className="form-label">Select Base Currency</label>
                                <select className="form-control" value={state.currency} onChange={handleCurrencyChange}>
                                    <option value="$">US Dollar ($)</option>
                                    <option value="₹">Indian Rupee (₹)</option>
                                </select>
                            </div>
                        </div>

                        {/* Backup & Purge Card */}
                        <div className="glass-card">
                            <h3 style={{ fontSize: '16px', marginBottom: '12px' }}><i className="fa-solid fa-database"></i> Database Actions</h3>
                            <p style={{ fontSize: '13px', color: 'var(--text-secondary)', marginBottom: '16px', lineHeight: '1.4' }}>
                                Download your ledger backups as JSON text files or load historical backups back into memory.
                            </p>
                            <div style={{ display: 'flex', gap: '10px', marginBottom: '16px' }}>
                                <button className="btn btn-secondary btn-sm" style={{ flex: 1 }} onClick={handleBackup}>
                                    Backup DB
                                </button>
                                <label className="btn btn-secondary btn-sm" style={{ flex: 1, cursor: 'pointer', textAlign: 'center', justifyContent: 'center' }}>
                                    Restore DB
                                    <input type="file" accept=".json" style={{ display: 'none' }} onChange={handleRestore} />
                                </label>
                            </div>
                            <button className="btn btn-danger btn-sm" style={{ width: '100%' }} onClick={handleReset}>
                                Reset Sandbox Data
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // --- Render Application Mount ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <ExpenseProvider>
                <App />
            </ExpenseProvider>
        );
    </script>
</body>
</html>
