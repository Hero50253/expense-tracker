        // --- Context & State Management ---

        const DEFAULT_STATE = {

            ],

                { id: 'e1', name: 'MacBook Pro 16" EMI', totalAmount: 2400, monthlyPayment: 200, paidTerms: 7, totalTerms: 12, interestRate: 0 },

            ],

            ],

                { id: 'se1', groupId: 'gr1', desc: 'High-speed Fiber Internet', amount: 90, paidBy: 'user_0', splits: [{ memberId: 'user_0', share: 30 }, { memberId: 'f1', share: 30 }, { memberId: 'f2', share: 30 }], date: '2026-07-01' },
                { id: 'se2', groupId: 'gr1', desc: 'Weekly Groceries Store', amount: 150, paidBy: 'f1', splits: [{ memberId: 'user_0', share: 50 }, { memberId: 'f1', share: 50 }, { memberId: 'f2', share: 50 }], date: '2026-07-03' },
                { id: 'se3', groupId: 'gr2', desc: 'Airbnb Beachside House', amount: 480, paidBy: 'user_0', splits: [{ memberId: 'user_0', share: 120 }, { memberId: 'f1', share: 120 }, { memberId: 'f2', share: 120 }, { memberId: 'f3', share: 120 }], date: '2026-07-04' },
                { id: 'se4', groupId: 'gr2', desc: 'Fuel Refill Station', amount: 80, paidBy: 'f2', splits: [{ memberId: 'user_0', share: 20 }, { memberId: 'f1', share: 20 }, { memberId: 'f2', share: 20 }, { memberId: 'f3', share: 20 }], date: '2026-07-05' }
            ],
            settlements: [
                { id: 's1', fromId: 'f2', toId: 'user_0', amount: 20, date: '2026-07-06' }
            ]
        };

        function expenseReducer(state, action) {
            let newState;
            switch (action.type) {
                case 'SET_THEME':
                    newState = { ...state, theme: action.payload };
                    break;
                case 'SET_CURRENCY':
                    newState = { ...state, currency: action.payload };
                    break;
                case 'SET_API_URL':
                    newState = { ...state, apiUrl: action.payload };
                    break;
                case 'AUTH_SUCCESS':
                    newState = {
                        ...state,
                        token: action.payload.token,
                        userEmail: action.payload.email,
                        currency: action.payload.currency || state.currency
                    };
                    break;
                case 'LOGOUT':
                    newState = {
                        ...state,
                        token: '',
                        userEmail: '',
                        transactions: [],
                        budgets: [],
                        savingsGoals: [],
                        creditCards: [],
                        emis: [],
                        friends: [],
                        groups: [],
                        sharedExpenses: [],
                        settlements: []
                    };
                    break;
                case 'SYNC_ALL_DATA':
                    newState = {
                        ...state,
                        ...action.payload
                    };
                    break;
                case 'ADD_TRANSACTION':
                    newState = { ...state, transactions: [action.payload, ...state.transactions] };
                    break;
                case 'DELETE_TRANSACTION':
                    newState = { ...state, transactions: state.transactions.filter(t => t.id !== action.payload) };
                    break;
                case 'ADD_BUDGET':
                    newState = { ...state, budgets: [...state.budgets, action.payload] };
                    break;
                case 'DELETE_BUDGET':
                    newState = { ...state, budgets: state.budgets.filter(b => b.id !== action.payload) };
                    break;
                case 'ADD_GOAL':
                    newState = { ...state, savingsGoals: [...state.savingsGoals, action.payload] };
                    break;
                case 'UPDATE_GOAL':
                    newState = {
                        ...state,
                        savingsGoals: state.savingsGoals.map(g => g.id === action.payload.id ? { ...g, current: action.payload.current } : g)
                    };
                    break;
                case 'ADD_CREDIT_CARD':
                    newState = { ...state, creditCards: [...state.creditCards, action.payload] };
                    break;
                case 'PAY_CREDIT_CARD':
                    newState = {
                        ...state,
                        creditCards: state.creditCards.map(c => c.id === action.payload.id ? { ...c, balance: Math.max(0, c.balance - action.payload.amount) } : c),
                        transactions: [
                            {
                                id: 't_cc_' + Date.now(),
                                desc: `Payment to ${action.payload.name}`,
                                amount: action.payload.amount,
                                type: 'expense',
                                category: 'Credit Card Payment',
                                method: 'Bank Transfer',
                                date: new Date().toISOString().split('T')[0],
                                recurring: 'One-time'
                            },
                            ...state.transactions
                        ]
                    };
                    break;
                case 'ADD_EMI':
                    newState = { ...state, emis: [...state.emis, action.payload] };
                    break;
                case 'PAY_EMI':
                    newState = {
                        ...state,
                        emis: state.emis.map(e => e.id === action.payload.id ? { ...e, paidTerms: Math.min(e.totalTerms, e.paidTerms + 1) } : e),
                        transactions: [
                            {
                                id: 't_emi_' + Date.now(),
                                desc: `EMI Payment: ${action.payload.name}`,
                                amount: action.payload.amount,
                                type: 'expense',
                                category: 'EMI Payment',
                                method: 'Bank Transfer',
                                date: new Date().toISOString().split('T')[0],
                                recurring: 'Monthly'
                            },
                            ...state.transactions
                        ]
                    };
                    break;
                case 'ADD_FRIEND':
                    newState = { ...state, friends: [...state.friends, action.payload] };
                    break;
                case 'ADD_GROUP':
                    newState = { ...state, groups: [...state.groups, action.payload] };
                    break;
                case 'ADD_SHARED_EXPENSE':
                    newState = { ...state, sharedExpenses: [...state.sharedExpenses, action.payload] };
                    break;
                case 'ADD_SETTLEMENT':
                    newState = { ...state, settlements: [...state.settlements, action.payload] };
                    break;
                case 'RESET_DATA':
                    newState = {
                        ...DEFAULT_STATE,
                        theme: state.theme,
                        apiUrl: state.apiUrl
                    };
                    break;
                default:
                    return state;
            }
            localStorage.setItem('expense_os_state', JSON.stringify(newState));
            return newState;
        }

        function ExpenseProvider({ children }) {
            const [state, dispatch] = useReducer(expenseReducer, null, () => {
                const local = localStorage.getItem('expense_os_state');
                if (local) {
                    try {
                        return JSON.parse(local);
                    } catch (e) {
                        return DEFAULT_STATE;
                    }
                }
                return DEFAULT_STATE;
            });

            // Set root theme element attribute on change
            useEffect(() => {
                if (state) {
                    document.documentElement.setAttribute('data-theme', state.theme);
                }
            }, [state.theme]);

            // API fetch helper
            const apiRequest = async (url, options = {}) => {
                if (!state.apiUrl) return null;
                
                const headers = {
                    'Content-Type': 'application/json',
                    ...options.headers
                };

                if (state.token) {
                    headers['Authorization'] = `Bearer ${state.token}`;
                }

                const response = await fetch(`${state.apiUrl}${url}`, {
                    ...options,
                    headers
                });

                if (response.status === 401 && state.token) {
                    dispatch({ type: 'LOGOUT' });
                    alert('Session expired. Please log in again.');
                    throw new Error('Unauthorized');
                }

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(errData.message || 'API request failed');
                }

                return response.json();
            };

            // Sync from Cloud on mount or token change
            useEffect(() => {
                const syncFromCloud = async () => {
                    if (state.apiUrl && state.token) {
                        try {
                            const [txs, bdgts, cards, emisList, frnds, grps, exps, setts] = await Promise.all([
                                apiRequest('/api/transactions'),
                                apiRequest('/api/budgets'),
                                apiRequest('/api/credit-cards'),
                                apiRequest('/api/emis'),
                                apiRequest('/api/splitwise/friends'),
                                apiRequest('/api/splitwise/groups'),
                                apiRequest('/api/splitwise/expenses'),
                                apiRequest('/api/splitwise/settlements')
                            ]);

                            dispatch({
                                type: 'SYNC_ALL_DATA',
                                payload: {
                                    transactions: txs.map(t => ({ ...t, id: t._id })),
                                    budgets: bdgts.map(b => ({ ...b, id: b._id })),
                                    creditCards: cards.map(c => ({ ...c, id: c._id })),
                                    emis: emisList.map(e => ({ ...e, id: e._id })),
                                    friends: frnds.map(f => ({ ...f, id: f._id })),
                                    groups: grps.map(g => ({ ...g, id: g._id })),
                                    sharedExpenses: exps.map(x => ({ ...x, id: x._id })),
                                    settlements: setts.map(s => ({ ...s, id: s._id }))
                                }
                            });
                        } catch (err) {
                            console.error('Failed to sync data from backend:', err);
                        }
                    }
                };

                syncFromCloud();
            }, [state.apiUrl, state.token]);

            // Calculate Splitwise net balances dynamically from shared expenses and settlements
            const splitwiseBalances = useMemo(() => {
                const balances = {};
                balances['user_0'] = 0;
                state.friends.forEach(f => {
                    balances[f.id] = 0;
                });

                // 1. Process shared expenses
                state.sharedExpenses.forEach(exp => {
                    const payer = exp.paidBy;
                    exp.splits.forEach(split => {
                        const debtor = split.memberId;
                        if (debtor !== payer) {
                            balances[debtor] -= split.share;
                            balances[payer] += split.share;
                        }
                    });
                });

                // 2. Process settlements
                state.settlements.forEach(set => {
                    balances[set.fromId] += set.amount;
                    balances[set.toId] -= set.amount;
                });

                return balances;
            }, [state.friends, state.sharedExpenses, state.settlements]);

            const value = {
                state,
                dispatch,
                splitwiseBalances,
                apiRequest
            };

            return (
                <ExpenseContext.Provider value={value}>
                    {children}
                </ExpenseContext.Provider>
            );
        }

        // --- Custom Component: SVG Charts ---
        function FinancialChart({ transactions }) {
            const { state } = useContext(ExpenseContext);
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul'];
            const incomeData = [4500, 4200, 4800, 5200, 4900, 5800, 0];
            const expenseData = [3100, 2900, 3500, 3800, 3100, 3300, 0];

            // Add current month's actual data from state
            const currentMonthIndex = 6; // July
            let currentInc = 0;
            let currentExp = 0;
            transactions.forEach(t => {
                if (t.date && t.date.startsWith('2026-07')) {
                    if (t.type === 'income') currentInc += t.amount;
                    else currentExp += t.amount;
                }
            });
            incomeData[currentMonthIndex] = currentInc;
            expenseData[currentMonthIndex] = currentExp;

            const maxVal = Math.max(...incomeData, ...expenseData, 6000) * 1.15;
            
            const width = 600;
            const height = 180;
            const paddingLeft = 50;
            const paddingRight = 20;
            const paddingTop = 20;
            const paddingBottom = 30;

            const chartWidth = width - paddingLeft - paddingRight;
            const chartHeight = height - paddingTop - paddingBottom;

            const getX = (index) => paddingLeft + (index / (months.length - 1)) * chartWidth;
            const getY = (val) => height - paddingBottom - (val / maxVal) * chartHeight;

            const incomePoints = incomeData.map((val, idx) => `${getX(idx)},${getY(val)}`).join(' ');
            const expensePoints = expenseData.map((val, idx) => `${getX(idx)},${getY(val)}`).join(' ');

            const incomeAreaPoints = `${getX(0)},${height - paddingBottom} ` + incomePoints + ` ${getX(months.length - 1)},${height - paddingBottom}`;
            const expenseAreaPoints = `${getX(0)},${height - paddingBottom} ` + expensePoints + ` ${getX(months.length - 1)},${height - paddingBottom}`;

            return (
                <div className="chart-container">
                    <svg className="chart-svg" viewBox={`0 0 ${width} ${height}`}>
                        <defs>
                            <linearGradient id="income-gradient" x1="0" y1="0" x2="0" y2="1">
                                <stop offset="0%" stopColor="var(--success)" stopOpacity="0.3" />
                                <stop offset="100%" stopColor="var(--success)" stopOpacity="0" />
                            </linearGradient>
                            <linearGradient id="expense-gradient" x1="0" y1="0" x2="0" y2="1">
                                <stop offset="0%" stopColor="var(--danger)" stopOpacity="0.25" />
                                <stop offset="100%" stopColor="var(--danger)" stopOpacity="0" />
                            </linearGradient>
                        </defs>
                        {/* Grid lines */}
                        {[0, 0.25, 0.5, 0.75, 1].map((ratio, i) => {
                            const yVal = maxVal * ratio;
                            const y = getY(yVal);
                            return (
                                <g key={i}>
                                    <line className="chart-grid-line" x1={paddingLeft} y1={y} x2={width - paddingRight} y2={y} />
                                    <text className="chart-label" x={paddingLeft - 10} y={y + 4} textAnchor="end">
                                        {state.currency}{Math.round(yVal)}
                                    </text>
                                </g>
                            );
                        })}

                        {/* Month labels */}
                        {months.map((m, idx) => (
                            <text key={idx} className="chart-label" x={getX(idx)} y={height - 8} textAnchor="middle">
                                {m}
                            </text>
                        ))}

                        {/* Chart Area Fills */}
                        <polygon className="chart-area-income" points={incomeAreaPoints} />
                        <polygon className="chart-area-expense" points={expenseAreaPoints} />

                        {/* Chart Lines */}
                        <polyline className="chart-line-income" points={incomePoints} />
                        <polyline className="chart-line-expense" points={expensePoints} />

                        {/* Data Points Tooltips & Circles */}
                        {incomeData.map((val, idx) => (
                            <circle key={`inc-${idx}`} cx={getX(idx)} cy={getY(val)} r="4" fill="var(--success)" stroke="var(--bg-card)" strokeWidth="2" />
                        ))}
                        {expenseData.map((val, idx) => (
                            <circle key={`exp-${idx}`} cx={getX(idx)} cy={getY(val)} r="4" fill="var(--danger)" stroke="var(--bg-card)" strokeWidth="2" />
                        ))}
                    </svg>
                </div>
            );
        }

        function DonutChart({ transactions }) {
            const { state } = useContext(ExpenseContext);
            const categoryTotals = {};
            let totalExpenses = 0;

            transactions.forEach(t => {
                if (t.type === 'expense') {
                    categoryTotals[t.category] = (categoryTotals[t.category] || 0) + t.amount;
                    totalExpenses += t.amount;
                }
            });

            const sortedCategories = Object.keys(categoryTotals)
                .map(cat => ({ name: cat, value: categoryTotals[cat] }))
                .sort((a, b) => b.value - a.value);

            const colors = {
                'Rent & Housing': 'var(--accent)',
                'Groceries': 'var(--accent-secondary)',
                'Dining Out': 'var(--warning)',
                'Software/Subscriptions': 'var(--accent-purple)',
                'Health': '#ec4899',
                'Transport': '#f43f5e',
                'Credit Card Payment': '#64748b',
                'EMI Payment': '#a855f7',
                'Other': '#10b981'
            };

            const getColor = (name) => colors[name] || '#6b7280';

            const radius = 50;
            const circumference = 2 * Math.PI * radius;
            let currentOffset = 0;

            const segments = sortedCategories.map(cat => {
                const percentage = totalExpenses > 0 ? cat.value / totalExpenses : 0;
                const dashArray = `${percentage * circumference} ${circumference}`;
                const dashOffset = currentOffset;
                currentOffset -= percentage * circumference;
                return {
                    ...cat,
                    dashArray,
                    dashOffset,
                    percentage,
                    color: getColor(cat.name)
                };
            });

            return (
                <div className="donut-container">
                    <div style={{ position: 'relative', display: 'flex', alignItems: 'center', justifyCenter: 'center', width: '160px', height: '160px' }}>
                        <svg className="donut-svg" viewBox="0 0 120 120">
                            <circle className="donut-bg" cx="60" cy="60" r={radius} />
                            {segments.map((seg, idx) => (
                                <circle
                                    key={idx}
                                    className="donut-segment"
                                    cx="60"
                                    cy="60"
                                    r={radius}
                                    stroke={seg.color}
                                    strokeDasharray={seg.dashArray}
                                    strokeDashoffset={seg.dashOffset}
                                />
                            ))}
                        </svg>
                        <div className="donut-center" style={{ left: 0, right: 0, top: 0, bottom: 0, margin: 'auto' }}>
                            <span className="donut-center-val">{state.currency}{totalExpenses.toFixed(0)}</span>
                            <span className="donut-center-lbl">Total Spent</span>
                        </div>
                    </div>

                    <div className="chart-legend">
                        {segments.slice(0, 4).map((seg, idx) => (
                            <div key={idx} className="legend-item">
                                <div className="legend-color" style={{ backgroundColor: seg.color }}></div>
                                <span style={{ flex: 1 }}>{seg.name}</span>
                                <span style={{ fontWeight: 600, color: 'var(--text-primary)' }}>
                                    {Math.round(seg.percentage * 100)}%
                                </span>
                            </div>
                        ))}
                        {segments.length > 4 && (
                            <div className="legend-item">
                                <div className="legend-color" style={{ backgroundColor: '#6b7280' }}></div>
                                <span style={{ flex: 1 }}>Others</span>
                                <span style={{ fontWeight: 600, color: 'var(--text-primary)' }}>
                                    {Math.round(segments.slice(4).reduce((sum, s) => sum + s.percentage, 0) * 100)}%
                                </span>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // --- Custom Component: Savings Goal Ring ---
        function SavingsGoalRing({ goal, onSave }) {
            const { state } = useContext(ExpenseContext);
            const pct = Math.min(100, Math.round((goal.current / goal.target) * 100));
            const radius = 32;
            const circ = 2 * Math.PI * radius;
            const offset = circ - (pct / 100) * circ;

            const [showAddVal, setShowAddVal] = useState(false);
            const [addAmt, setAddAmt] = useState('');

            const handleSave = () => {
                if (!addAmt || isNaN(addAmt)) return;
                onSave(goal.id, goal.current + parseFloat(addAmt));
                setAddAmt('');
                setShowAddVal(false);
            };

            return (
                <div className="glass-card savings-ring-card">
                    <div className="svg-ring-container">
                        <svg>
                            <circle className="ring-bg" cx="40" cy="40" r={radius} />
                            <circle
                                className="ring-fill"
                                cx="40"
                                cy="40"
                                r={radius}
                                strokeDasharray={circ}
                                strokeDashoffset={offset}
                            />
                        </svg>
                        <span className="ring-text">{pct}%</span>
                    </div>

                    <div className="savings-goal-details">
                        <h4 className="goal-name">{goal.name}</h4>
                        <div className="goal-values">
                            <strong>{state.currency}{goal.current.toLocaleString()}</strong> of {state.currency}{goal.target.toLocaleString()}
                        </div>
                        {showAddVal ? (
                            <div style={{ display: 'flex', gap: '6px', marginTop: '8px' }}>
                                <input
                                    type="number"
                                    className="form-control"
                                    style={{ padding: '4px 8px', fontSize: '12px', width: '80px' }}
                                    placeholder="Amount"
                                    value={addAmt}
                                    onChange={e => setAddAmt(e.target.value)}
                                />
                                <button className="btn btn-primary btn-sm" onClick={handleSave}>Add</button>
                                <button className="btn btn-secondary btn-sm" onClick={() => setShowAddVal(false)}><i className="fa-solid fa-xmark"></i></button>
                            </div>
                        ) : (
                            <button
                                className="btn btn-secondary btn-sm"
                                style={{ marginTop: '8px', padding: '4px 10px', fontSize: '11px' }}
                                onClick={() => setShowAddVal(true)}
                            >
                                <i className="fa-solid fa-plus"></i> Add Funds
                            </button>
                        )}
                    </div>
                </div>
            );
        }

        // --- Auth Screen (Gateway) ---
        function AuthView() {
            const { state, dispatch } = useContext(ExpenseContext);
            const [isLogin, setIsLogin] = useState(true);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [currency, setCurrency] = useState('$');
            const [loading, setLoading] = useState(false);

                e.preventDefault();

                setLoading(true);

                try {
                    const endpoint = isLogin ? '/api/auth/login' : '/api/auth/signup';
                    const body = isLogin ? { email, password } : { email, password, currency };

                    const res = await fetch(`${state.apiUrl}${endpoint}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });

                    const data = await res.json();
                    if (!res.ok) throw new Error(data.message || 'Authentication failed');

                    dispatch({
                        type: 'AUTH_SUCCESS',
                        payload: {
                            token: data.token,
                            email: data.user.email,
                            currency: data.user.currency
                        }
                    });
                } catch (err) {
                    alert(err.message);
                } finally {
                    setLoading(false);
                }
            };

                dispatch({ type: 'SET_API_URL', payload: '' }); // resets to local mode

        // --- View Component: Ledger (Full Transactions) ---
        function TransactionsView() {
            const { state, dispatch, apiRequest } = useContext(ExpenseContext);
            const [search, setSearch] = useState('');
            const [typeFilter, setTypeFilter] = useState('all');
            const [catFilter, setCatFilter] = useState('all');
            const [showAddTx, setShowAddTx] = useState(false);

            const categories = useMemo(() => {
                const cats = new Set();
                state.transactions.forEach(t => cats.add(t.category));
                return Array.from(cats);
            }, [state.transactions]);

            const filteredTransactions = useMemo(() => {
                return state.transactions.filter(t => {
                    const matchesSearch = t.desc.toLowerCase().includes(search.toLowerCase()) || t.category.toLowerCase().includes(search.toLowerCase());
                    const matchesType = typeFilter === 'all' ? true : t.type === typeFilter;
                    const matchesCat = catFilter === 'all' ? true : t.category === catFilter;
                    return matchesSearch && matchesType && matchesCat;
                });
            }, [state.transactions, search, typeFilter, catFilter]);

            const handleExportCSV = () => {
                const headers = ['Description', 'Amount', 'Type', 'Category', 'Payment Method', 'Date', 'Recurring'];
                const rows = filteredTransactions.map(t => [
                    `"${t.desc.replace(/"/g, '""')}"`,
                    t.amount,
                    t.type,
                    t.category,
                    t.method,
                    t.date,
                    t.recurring
                ]);

                const csvContent = "data:text/csv;charset=utf-8," 
                    + [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
                
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `ExpenseOS_Ledger_Export_${new Date().toISOString().split('T')[0]}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const handleDelete = async (id) => {
                if (confirm('Delete this ledger record?')) {
                    try {
                        if (state.apiUrl && state.token) {
                            await apiRequest(`/api/transactions/${id}`, { method: 'DELETE' });
                        }
                        dispatch({ type: 'DELETE_TRANSACTION', payload: id });
                    } catch (err) {
                        alert(err.message);
                    }
                }
            };

            return (
                <div>
                    <div className="header">
                        <div className="header-title">
                            <h1>Unified Account Ledger</h1>
                            <p>Audit and manage your complete historical financial records</p>
                        </div>
                        <div className="header-actions">
                            <button className="btn btn-secondary" onClick={handleExportCSV}>
                                <i className="fa-solid fa-file-csv"></i> Export CSV
                            </button>
                            <button className="btn btn-primary" onClick={() => setShowAddTx(true)}>
                                <i className="fa-solid fa-plus"></i> Record Entry
                            </button>
                        </div>
                    </div>

                    <div className="glass-card toolbar">
                        <div className="search-wrapper">
                            <i className="fa-solid fa-magnifying-glass search-icon"></i>
                            <input
                                type="text"
                                className="search-input"
                                placeholder="Search ledger by description, vendor, tags..."
                                value={search}
                                onChange={e => setSearch(e.target.value)}
                            />
                        </div>

                        <div className="filters-group">
                            <select className="filter-select" value={typeFilter} onChange={e => setTypeFilter(e.target.value)}>
                                <option value="all">All Types</option>
                                <option value="income">Deposits (Credits)</option>
                                <option value="expense">Debits (Expenses)</option>
                            </select>

                            <select className="filter-select" value={catFilter} onChange={e => setCatFilter(e.target.value)}>
                                <option value="all">All Categories</option>
                                {categories.map(cat => <option key={cat} value={cat}>{cat}</option>)}
                            </select>
                        </div>
                    </div>

                    <div className="ledger-table-container">
                        <table className="ledger-table">
                            <thead>
                                <tr>
                                    <th>Executed Date</th>
                                    <th>Ledger Details</th>
                                    <th>Category</th>
                                    <th>Payment Account</th>
                                    <th>Cycle</th>
                                    <th style={{ textAlign: 'right' }}>Valuation</th>
                                    <th style={{ width: '80px', textAlign: 'center' }}>Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                {filteredTransactions.length === 0 ? (
                                    <tr>
                                        <td colSpan="7" style={{ textAlign: 'center', padding: '32px', color: 'var(--text-secondary)' }}>
                                            No matching transaction records located in memory.
                                        </td>
                                    </tr>
                                ) : (
                                    filteredTransactions.map(t => (
                                        <tr key={t.id}>
                                            <td style={{ color: 'var(--text-secondary)' }}>{t.date}</td>
                                            <td style={{ fontWeight: 600 }}>{t.desc}</td>
                                            <td><span className="tx-tag">{t.category}</span></td>
                                            <td><span className="tx-tag" style={{ background: 'rgba(99,102,241,0.05)', color: 'var(--accent)' }}>{t.method}</span></td>
                                            <td style={{ color: 'var(--text-muted)' }}>{t.recurring}</td>
                                            <td style={{ textAlign: 'right', fontWeight: 700, fontSize: '14px' }} className={t.type === 'income' ? 'income' : 'expense'}>
                                                {t.type === 'income' ? '+' : '-'}{state.currency}{t.amount.toFixed(2)}
                                            </td>
                                            <td style={{ textAlign: 'center' }}>
                                                <button className="btn btn-secondary btn-sm btn-danger" style={{ padding: '4px 8px' }} onClick={() => handleDelete(t.id)}>
                                                    <i className="fa-solid fa-trash-can"></i>
                                                </button>
                                            </td>
                                        </tr>
                                    ))
                                )}
                            </tbody>
                        </table>
                    </div>

                    {showAddTx && <AddTransactionModal onClose={() => setShowAddTx(false)} />}
                </div>
            );
        }

        // --- View Component: Budgets & Goals ---
        function BudgetsView() {
            const { state, dispatch, apiRequest } = useContext(ExpenseContext);
            const [showAddBudget, setShowAddBudget] = useState(false);
            const [showAddGoal, setShowAddGoal] = useState(false);

            const [bCategory, setBCategory] = useState('Groceries');
            const [bLimit, setBLimit] = useState('');

            const [gName, setGName] = useState('');
            const [gTarget, setGTarget] = useState('');
            const [gCurrent, setGCurrent] = useState('');

            const handleAddBudgetSubmit = async (e) => {
                e.preventDefault();
                if (!bLimit) return;
                
                if (state.budgets.some(b => b.category === bCategory)) {
                    alert('A budget limit already exists for this category.');
                    return;
                }

                const budgetData = { category: bCategory, limit: parseFloat(bLimit) };

                try {
                    if (state.apiUrl && state.token) {
                        const saved = await apiRequest('/api/budgets', {
                            method: 'POST',
                            body: JSON.stringify(budgetData)
                        });
                        dispatch({ type: 'ADD_BUDGET', payload: { ...saved, id: saved._id } });
                    } else {
                        dispatch({ type: 'ADD_BUDGET', payload: { ...budgetData, id: 'b_' + Date.now() } });
                    }
                    setBLimit('');
                    setShowAddBudget(false);
                } catch (err) {
                    alert(err.message);
                }
            };

            const handleAddGoalSubmit = (e) => {
                e.preventDefault();
                if (!gName || !gTarget) return;

                dispatch({
                    type: 'ADD_GOAL',
                    payload: {
                        id: 'g_' + Date.now(),
                        name: gName,
                        target: parseFloat(gTarget),
                        current: parseFloat(gCurrent || 0)
                    }
                });
                setGName('');
                setGTarget('');
                setGCurrent('');
                setShowAddGoal(false);
            };

            const handleUpdateGoalCurrent = (id, newAmt) => {
                dispatch({
                    type: 'UPDATE_GOAL',
                    payload: { id, current: newAmt }
                });
            };

            const handleDeleteBudget = async (id) => {
                if (confirm('Delete this budget limit?')) {
                    try {
                        if (state.apiUrl && state.token) {
                            await apiRequest(`/api/budgets/${id}`, { method: 'DELETE' });
                        }
                        dispatch({ type: 'DELETE_BUDGET', payload: id });
                    } catch (err) {
                        alert(err.message);
                    }
                }
            };

            const categoriesList = ['Rent & Housing', 'Groceries', 'Dining Out', 'Shopping', 'Transport', 'Entertainment', 'Software/Subscriptions', 'Utilities', 'Health', 'Insurance', 'Other'];

            const upcomingBills = [
                { name: 'AWS Infrastructure Server', amount: 45.00, dueDate: 'July 12', paid: false },
                { name: 'Equinox Gym Facility', amount: 150.00, dueDate: 'July 15', paid: true },
                { name: 'Apple One Cloud Subscription', amount: 32.95, dueDate: 'July 18', paid: false },
                { name: 'Adobe Creative Suite', amount: 54.99, dueDate: 'July 22', paid: false }
            ];

            return (
                <div>
                    <div className="header">
                        <div className="header-title">
                            <h1>Budgets & Wealth Acceleration Goals</h1>
                            <p>Maintain control over capital allocations and track savings landmarks</p>
                        </div>
                        <div className="header-actions">
                            <button className="btn btn-secondary" onClick={() => setShowAddBudget(true)}>
                                <i className="fa-solid fa-plus"></i> Configure Budget
                            </button>
                            <button className="btn btn-primary" onClick={() => setShowAddGoal(true)}>
                                <i className="fa-solid fa-bullseye"></i> Set Savings Goal
                            </button>
                        </div>
                    </div>

                    <div className="glass-card" style={{ marginBottom: '32px' }}>
                        <div className="card-title-bar">
                            <h3><i className="fa-solid fa-scale-balanced"></i> Active Capital Budgets</h3>
                        </div>
                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(320px, 1fr))', gap: '24px' }}>
                            {state.budgets.length === 0 ? (
                                <p style={{ color: 'var(--text-secondary)' }}>No active expense budgets created yet.</p>
                            ) : (
                                state.budgets.map(b => {
                                    const spent = state.transactions
                                        .filter(t => t.type === 'expense' && t.category === b.category)
                                        .reduce((sum, t) => sum + t.amount, 0);
                                    const pct = Math.min(100, Math.round((spent / b.limit) * 100));
                                    const color = pct > 90 ? 'red' : pct > 75 ? 'yellow' : 'green';

                                    return (
                                        <div key={b.id} style={{ padding: '16px', border: '1px solid var(--border-color)', borderRadius: 'var(--radius-md)' }}>
                                            <div className="budget-info-row" style={{ marginBottom: '10px' }}>
                                                <span className="budget-cat" style={{ fontSize: '14px' }}>{b.category}</span>
                                                <button className="btn btn-secondary btn-sm" style={{ padding: '2px 6px', color: 'var(--danger)', borderColor: 'transparent' }} onClick={() => handleDeleteBudget(b.id)}>
                                                    <i className="fa-solid fa-xmark"></i>
                                                </button>
                                            </div>
                                            <div className="budget-info-row">
                                                <span className="budget-val" style={{ fontSize: '13px' }}>{state.currency}{spent.toLocaleString()} / <strong>{state.currency}{b.limit}</strong></span>
                                                <span style={{ fontSize: '13px', fontWeight: 600, color: `var(--${color === 'red' ? 'danger' : color === 'yellow' ? 'warning' : 'success'})` }}>
                                                    {pct}% used
                                                </span>
                                            </div>
                                            <div className="progress-track" style={{ marginTop: '8px' }}>
                                                <div className={`progress-fill ${color}`} style={{ width: `${pct}%` }}></div>
                                            </div>
                                        </div>
                                    );
                                })
                            )}
                        </div>
                    </div>

                    <div style={{ marginBottom: '32px' }}>
                        <div className="card-title-bar">
                            <h3><i className="fa-solid fa-vault"></i> Savings & Investment Goals</h3>
                        </div>
                        <div className="savings-goal-grid">
                            {state.savingsGoals.map(g => (
                                <SavingsGoalRing key={g.id} goal={g} onSave={handleUpdateGoalCurrent} />
                            ))}
                        </div>
                    </div>

                    <div className="glass-card">
                        <div className="card-title-bar">
                            <h3><i className="fa-solid fa-calendar-days"></i> Upcoming Reoccurring Subscriptions</h3>
                        </div>
                        <div className="bills-grid">
                            {upcomingBills.map((bill, idx) => (
                                <div key={idx} className={`glass-card bill-card ${bill.paid ? 'paid' : 'due'}`}>
                                    <div className="bill-due-date">{bill.dueDate}</div>
                                    <div className="bill-name">{bill.name}</div>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: '12px' }}>
                                        <div className="bill-amount">{state.currency}{bill.amount}</div>
                                        <span className="tx-tag" style={{ color: bill.paid ? 'var(--success)' : 'var(--warning)', background: bill.paid ? 'var(--success-glow)' : 'var(--warning-glow)' }}>
                                            {bill.paid ? 'Paid' : 'Unpaid'}
                                        </span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {showAddBudget && (
                        <div className="modal-overlay">
                            <div className="modal-content">
                                <div className="modal-header">
                                    <h3>Allocate New Budget Limit</h3>
                                    <button className="modal-close" onClick={() => setShowAddBudget(false)}><i className="fa-solid fa-xmark"></i></button>
                                </div>
                                <form onSubmit={handleAddBudgetSubmit}>
                                    <div className="modal-body">
                                        <div className="form-group">
                                            <label className="form-label">Category</label>
                                            <select className="form-control" value={bCategory} onChange={e => setBCategory(e.target.value)}>
                                                {categoriesList.map(cat => <option key={cat} value={cat}>{cat}</option>)}
                                            </select>
                                        </div>
                                        <div className="form-group">
                                            <label className="form-label">Monthly Limit Allocation ({state.currency})</label>
                                            <input type="number" required className="form-control" placeholder="0.00" value={bLimit} onChange={e => setBLimit(e.target.value)} />
                                        </div>
                                    </div>
                                    <div className="modal-footer">
                                        <button type="button" className="btn btn-secondary" onClick={() => setShowAddBudget(false)}>Cancel</button>
                                        <button type="submit" className="btn btn-primary">Establish Limit</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {showAddGoal && (
                        <div className="modal-overlay">
                            <div className="modal-content">
                                <div className="modal-header">
                                    <h3>Construct Savings Goal Target</h3>
                                    <button className="modal-close" onClick={() => setShowAddGoal(false)}><i className="fa-solid fa-xmark"></i></button>
                                </div>
                                <form onSubmit={handleAddGoalSubmit}>
                                    <div className="modal-body">
                                        <div className="form-group">
                                            <label className="form-label">Goal Label / Purchase Target</label>
                                            <input type="text" required className="form-control" placeholder="e.g. Retirement Vault" value={gName} onChange={e => setGName(e.target.value)} />
                                        </div>
                                        <div className="form-row">
                                            <div className="form-group">
                                                <label className="form-label">Target Accumulation ({state.currency})</label>
                                                <input type="number" required className="form-control" placeholder="10000" value={gTarget} onChange={e => setGTarget(e.target.value)} />
                                            </div>
                                            <div className="form-group">
                                                <label className="form-label">Initial Seed Funding ({state.currency})</label>
                                                <input type="number" className="form-control" placeholder="0" value={gCurrent} onChange={e => setGCurrent(e.target.value)} />
                                            </div>
                                        </div>
                                    </div>
                                    <div className="modal-footer">
                                        <button type="button" className="btn btn-secondary" onClick={() => setShowAddGoal(false)}>Cancel</button>
                                        <button type="submit" className="btn btn-primary">Define Goal</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // --- View Component: Credit & EMIs Tracker ---
        function CreditView() {
            const { state, dispatch, apiRequest } = useContext(ExpenseContext);
            const [showAddCC, setShowAddCC] = useState(false);
            const [showAddEMI, setShowAddEMI] = useState(false);

            const [ccName, setCCName] = useState('');
            const [ccLimit, setCCLimit] = useState('');
            const [ccBalance, setCCBalance] = useState('');
            const [ccDueDate, setCCDueDate] = useState('');

            const [eName, setEName] = useState('');
            const [eTotal, setETotal] = useState('');
            const [eMonthly, setEMonthly] = useState('');
            const [ePaidTerms, setEPaidTerms] = useState('0');
            const [eTotalTerms, setETotalTerms] = useState('12');
            const [eInterest, setEInterest] = useState('0');

            const handleAddCCSubmit = async (e) => {
                e.preventDefault();
                if (!ccName || !ccLimit) return;
                const ccData = {
                    name: ccName,
                    limit: parseFloat(ccLimit),
                    balance: parseFloat(ccBalance || 0),
                    dueDate: ccDueDate || '2026-07-28'
                };

                try {
                    if (state.apiUrl && state.token) {
                        const saved = await apiRequest('/api/credit-cards', {
                            method: 'POST',
                            body: JSON.stringify(ccData)
                        });
                        dispatch({ type: 'ADD_CREDIT_CARD', payload: { ...saved, id: saved._id } });
                    } else {
                        dispatch({ type: 'ADD_CREDIT_CARD', payload: { ...ccData, id: 'c_' + Date.now() } });
                    }
                    setCCName('');
                    setCCLimit('');
                    setCCBalance('');
                    setCCDueDate('');
                    setShowAddCC(false);
                } catch (err) {
                    alert(err.message);
                }
            };

            const handleAddEMISubmit = async (e) => {
                e.preventDefault();
                if (!eName || !eTotal || !eMonthly) return;
                const emiData = {
                    name: eName,
                    totalAmount: parseFloat(eTotal),
                    monthlyPayment: parseFloat(eMonthly),
                    paidTerms: parseInt(ePaidTerms),
                    totalTerms: parseInt(eTotalTerms),
                    interestRate: parseFloat(eInterest || 0)
                };

                try {
                    if (state.apiUrl && state.token) {
                        const saved = await apiRequest('/api/emis', {
                            method: 'POST',
                            body: JSON.stringify(emiData)
                        });
                        dispatch({ type: 'ADD_EMI', payload: { ...saved, id: saved._id } });
                    } else {
                        dispatch({ type: 'ADD_EMI', payload: { ...emiData, id: 'e_' + Date.now() } });
                    }
                    setEName('');
                    setETotal('');
                    setEMonthly('');
                    setEPaidTerms('0');
                    setETotalTerms('12');
                    setEInterest('0');
                    setShowAddEMI(false);
                } catch (err) {
                    alert(err.message);
                }
            };

            const handlePayCard = async (id, name, currentBalance) => {
                const amtStr = prompt(`Enter payment amount to credit statement of ${name}:`, currentBalance);
                if (amtStr && !isNaN(amtStr)) {
                    const amount = parseFloat(amtStr);
                    try {
                        if (state.apiUrl && state.token) {
                            await apiRequest(`/api/credit-cards/${id}/pay`, {
                                method: 'PUT',
                                body: JSON.stringify({ amount })
                            });
                        }
                        dispatch({ type: 'PAY_CREDIT_CARD', payload: { id, name, amount } });
                    } catch (err) {
                        alert(err.message);
                    }
                }
            };

            const handlePayEMI = async (id, name, monthlyPayment) => {
                if (confirm(`Approve monthly payment transaction of ${state.currency}${monthlyPayment} for ${name}?`)) {
                    try {
                        if (state.apiUrl && state.token) {
                            await apiRequest(`/api/emis/${id}/pay`, { method: 'PUT' });
                        }
                        dispatch({ type: 'PAY_EMI', payload: { id, name, amount: monthlyPayment } });
                    } catch (err) {
                        alert(err.message);
                    }
                }
            };

            return (
                <div>
                    <div className="header">
                        <div className="header-title">
                            <h1>Lines of Credit & Amortization</h1>
                            <p>Control credit utilization margins and monitor long-term debt payoff vectors</p>
                        </div>
                        <div className="header-actions">
                            <button className="btn btn-secondary" onClick={() => setShowAddCC(true)}>
                                <i className="fa-solid fa-plus"></i> Connect Credit Line
                            </button>
                            <button className="btn btn-primary" onClick={() => setShowAddEMI(true)}>
                                <i className="fa-solid fa-landmark"></i> Register Loan/EMI
                            </button>
                        </div>
                    </div>

                    <div className="card-title-bar">
                        <h3><i className="fa-solid fa-credit-card"></i> Credit Card Utilization</h3>
                    </div>
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(320px, 1fr))', gap: '24px', marginBottom: '32px' }}>
                        {state.creditCards.map(c => {
                            const pct = Math.min(100, Math.round((c.balance / c.limit) * 100));
                            const color = pct > 40 ? 'red' : pct > 20 ? 'yellow' : 'green';
                            return (
                                <div key={c.id} className="glass-card calculator-card">
                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                        <strong style={{ fontSize: '15px' }}>{c.name}</strong>
                                        <button className="btn btn-secondary btn-sm" onClick={() => handlePayCard(c.id, c.name, c.balance)}>
                                            Pay Card
                                        </button>
                                    </div>
                                    <div className="cc-outstanding-val">{state.currency}{c.balance.toLocaleString()}</div>
                                    <div className="cc-details-row">
                                        <span>Utilized: {pct}%</span>
                                        <span>Limit: {state.currency}{c.limit.toLocaleString()}</span>
                                    </div>
                                    <div className="progress-track" style={{ marginTop: '8px', height: '4px' }}>
                                        <div className={`progress-fill ${color}`} style={{ width: `${pct}%` }}></div>
                                    </div>
                                    <div className="cc-details-row" style={{ marginTop: '12px', fontSize: '11px', color: 'var(--text-muted)' }}>
                                        <span>Statement Due Date: {c.dueDate}</span>
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    <div className="card-title-bar">
                        <h3><i className="fa-solid fa-clock"></i> EMI & Loan Payoffs</h3>
                    </div>
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(320px, 1fr))', gap: '24px' }}>
                        {state.emis.length === 0 ? (
                            <p style={{ color: 'var(--text-secondary)' }}>No active EMI loans tracked.</p>
                        ) : (
                            state.emis.map(e => {
                                const remainingTerms = e.totalTerms - e.paidTerms;
                                const remainingAmount = remainingTerms * e.monthlyPayment;
                                const pctPaid = Math.round((e.paidTerms / e.totalTerms) * 100);
                                return (
                                    <div key={e.id} className="glass-card calculator-card">
                                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                            <strong style={{ fontSize: '15px' }}>{e.name}</strong>
                                            {remainingTerms > 0 ? (
                                                <button className="btn btn-primary btn-sm" onClick={() => handlePayEMI(e.id, e.name, e.monthlyPayment)}>
                                                    Pay Bill
                                                </button>
                                            ) : (
                                                <span className="tx-tag" style={{ color: 'var(--success)', background: 'var(--success-glow)' }}>Fulfilled</span>
                                            )}
                                        </div>
                                        <div className="cc-outstanding-val" style={{ fontSize: '22px' }}>
                                            {state.currency}{remainingAmount.toLocaleString()}
                                            <span style={{ fontSize: '11px', fontWeight: 500, color: 'var(--text-muted)', marginLeft: '8px' }}>remaining</span>
                                        </div>
                                        <div className="cc-details-row">
                                            <span>Installment: {state.currency}{e.monthlyPayment}/mo</span>
                                            <span>Terms: {e.paidTerms} / {e.totalTerms} paid ({pctPaid}%)</span>
                                        </div>
                                        <div className="progress-track" style={{ marginTop: '8px', height: '4px' }}>
                                            <div className="progress-fill green" style={{ width: `${pctPaid}%` }}></div>
                                        </div>
                                        <div className="cc-details-row" style={{ marginTop: '12px', fontSize: '11px', color: 'var(--text-muted)' }}>
                                            <span>Annualized Rate: {e.interestRate}% APR</span>
                                        </div>
                                    </div>
                                );
                            })
                        )}
                    </div>

                    {showAddCC && (
                        <div className="modal-overlay">
                            <div className="modal-content">
                                <div className="modal-header">
                                    <h3>Register Credit Line Account</h3>
                                    <button className="modal-close" onClick={() => setShowAddCC(false)}><i className="fa-solid fa-xmark"></i></button>
                                </div>
                                <form onSubmit={handleAddCCSubmit}>
                                    <div className="modal-body">
                                        <div className="form-group">
                                            <label className="form-label">Card Label / Institution</label>
                                            <input type="text" required className="form-control" placeholder="e.g. Vercel Black Card" value={ccName} onChange={e => setCCName(e.target.value)} />
                                        </div>
                                        <div className="form-row">
                                            <div className="form-group">
                                                <label className="form-label">Total Credit Limit ({state.currency})</label>
                                                <input type="number" required className="form-control" placeholder="10000" value={ccLimit} onChange={e => setCCLimit(e.target.value)} />
                                            </div>
                                            <div className="form-group">
                                                <label className="form-label">Outstanding Statement Balance ({state.currency})</label>
                                                <input type="number" className="form-control" placeholder="0" value={ccBalance} onChange={e => setCCBalance(e.target.value)} />
                                            </div>
                                        </div>
                                        <div className="form-group">
                                            <label className="form-label">Statement Due Date</label>
                                            <input type="date" className="form-control" value={ccDueDate} onChange={e => setCCDueDate(e.target.value)} />
                                        </div>
                                    </div>

        // --- View Component: Splitwise Integrated Module ---
        function SplitwiseView() {
            const { state, dispatch, splitwiseBalances, apiRequest } = useContext(ExpenseContext);
            const [selectedGroup, setSelectedGroup] = useState(null);
            const [selectedFriend, setSelectedFriend] = useState(null);
            const [showAddFriend, setShowAddFriend] = useState(false);
            const [showAddGroup, setShowAddGroup] = useState(false);
            const [showAddExpense, setShowAddExpense] = useState(false);

            const [fName, setFName] = useState('');
            const [fEmail, setFEmail] = useState('');
            const [gName, setGName] = useState('');
            const [gDesc, setGDesc] = useState('');
            const [gMembers, setGMembers] = useState(['user_0']);

            const [seDesc, setSEDesc] = useState('');
            const [seAmt, setSEAmt] = useState('');
            const [sePayer, setSEPayer] = useState('user_0');

            const handleAddFriend = async (e) => {
                e.preventDefault();
                if (!fName) return;
                const friendData = { name: fName, email: fEmail };

                try {
                    if (state.apiUrl && state.token) {
                        const saved = await apiRequest('/api/splitwise/friends', {
                            method: 'POST',
                            body: JSON.stringify(friendData)
                        });
                        dispatch({ type: 'ADD_FRIEND', payload: { ...saved, id: saved._id } });
                    } else {
                        dispatch({ type: 'ADD_FRIEND', payload: { ...friendData, id: 'f_' + Date.now() } });
                    }
                    setFName('');
                    setFEmail('');
                    setShowAddFriend(false);
                } catch (err) {
                    alert(err.message);
                }
            };

            const handleAddGroup = async (e) => {
                e.preventDefault();
                if (!gName) return;
                const groupData = { name: gName, desc: gDesc, members: gMembers };

                try {
                    if (state.apiUrl && state.token) {
                        const saved = await apiRequest('/api/splitwise/groups', {
                            method: 'POST',
                            body: JSON.stringify(groupData)
                        });
                        dispatch({ type: 'ADD_GROUP', payload: { ...saved, id: saved._id } });
                    } else {
                        dispatch({ type: 'ADD_GROUP', payload: { ...groupData, id: 'gr_' + Date.now() } });
                    }
                    setGName('');
                    setGDesc('');
                    setGMembers(['user_0']);
                    setShowAddGroup(false);
                } catch (err) {
                    alert(err.message);
                }
            };

            const handleAddSharedExpense = async (e) => {
                e.preventDefault();
                if (!seDesc || !seAmt || !selectedGroup) return;

                const amount = parseFloat(seAmt);
                const activeGroup = state.groups.find(g => g.id === selectedGroup);
                const count = activeGroup.members.length;
                const shareAmount = amount / count;

                const splits = activeGroup.members.map(mId => ({
                    memberId: mId,
                    share: shareAmount
                }));

                const expenseData = {
                    groupId: selectedGroup,
                    desc: seDesc,
                    amount,
                    paidBy: sePayer,
                    splits,
                    date: new Date().toISOString().split('T')[0]
                };

                try {
                    if (state.apiUrl && state.token) {
                        const saved = await apiRequest('/api/splitwise/expenses', {
                            method: 'POST',
                            body: JSON.stringify(expenseData)
                        });
                        dispatch({ type: 'ADD_SHARED_EXPENSE', payload: { ...saved, id: saved._id } });
                    } else {
                        dispatch({ type: 'ADD_SHARED_EXPENSE', payload: { ...expenseData, id: 'se_' + Date.now() } });
                    }
                    setSEDesc('');
                    setSEAmt('');
                    setSEPayer('user_0');
                    setShowAddExpense(false);
                } catch (err) {
                    alert(err.message);
                }
            };

            const handleSettleDebt = async (debtorId, creditorId, amount) => {
                const setData = {
                    fromId: debtorId,
                    toId: creditorId,
                    amount,
                    date: new Date().toISOString().split('T')[0]
                };

                try {
                    if (state.apiUrl && state.token) {
                        const saved = await apiRequest('/api/splitwise/settlements', {
                            method: 'POST',
                            body: JSON.stringify(setData)
                        });
                        dispatch({ type: 'ADD_SETTLEMENT', payload: { ...saved, id: saved._id } });
                    } else {
                        dispatch({ type: 'ADD_SETTLEMENT', payload: { ...setData, id: 's_' + Date.now() } });
                    }
                } catch (err) {
                    alert(err.message);
                }
            };

            const getMemberName = (id) => {
                if (id === 'user_0') return 'You (Me)';
                const f = state.friends.find(friend => friend.id === id);
                return f ? f.name : 'Unknown Friend';
            };

            const groupSimplification = useMemo(() => {
                if (!selectedGroup) return [];
                const activeGroup = state.groups.find(g => g.id === selectedGroup);
                if (!activeGroup) return [];

                const groupBalances = {};
                activeGroup.members.forEach(mId => { groupBalances[mId] = 0; });

                state.sharedExpenses.forEach(exp => {
                    if (exp.groupId === selectedGroup) {
                        const payer = exp.paidBy;
                        exp.splits.forEach(split => {
                            const debtor = split.memberId;
                            if (debtor !== payer) {
                                groupBalances[debtor] -= split.share;
                                groupBalances[payer] += split.share;
                            }
                        });
                    }
                });

                state.settlements.forEach(set => {
                    if (groupBalances[set.fromId] !== undefined && groupBalances[set.toId] !== undefined) {
                        groupBalances[set.fromId] += set.amount;
                        groupBalances[set.toId] -= set.amount;
                    }
                });

                let debtors = [];
                let creditors = [];
                Object.keys(groupBalances).forEach(id => {
                    let bal = groupBalances[id];
                    if (bal < -0.01) debtors.push({ id, amount: -bal });
                    else if (bal > 0.01) creditors.push({ id, amount: bal });
                });

                let simplified = [];
                let i = 0, j = 0;
                debtors.sort((a,b) => b.amount - a.amount);
                creditors.sort((a,b) => b.amount - a.amount);

                while (i < debtors.length && j < creditors.length) {
                    let debtor = debtors[i];
                    let creditor = creditors[j];
                    let payAmt = Math.min(debtor.amount, creditor.amount);

                    simplified.push({
                        from: debtor.id,
                        to: creditor.id,
                        amount: payAmt
                    });

                    debtor.amount -= payAmt;
                    creditor.amount -= payAmt;
                    if (debtor.amount < 0.01) i++;
                    if (creditor.amount < 0.01) j++;
                }

                return { simplified, groupBalances };

                        <div className="split-main">
                            {selectedGroup ? (
